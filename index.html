<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>バドミントン練習エディタ 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a7a4a;--gl:#e8f5ee;--blue:#1a4a8a;--bl:#e8eef8;--orange:#c85a0a;--ol:#fdf0e8;--grl:#f5f5f3;--border:#e0e0da;--font:'Noto Sans JP',sans-serif;}
body{font-family:var(--font);background:#1a1a1a;color:#222;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* HEADER */
.hdr{background:var(--green);color:#fff;padding:0 10px;display:flex;align-items:center;gap:7px;height:44px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;white-space:nowrap}
.logo em{color:#a8e6c0;font-size:10px;font-family:var(--font);font-style:normal;letter-spacing:0;margin-left:3px}
.htabs{display:flex;gap:1px;background:rgba(0,0,0,.2);border-radius:4px;padding:2px;flex-shrink:0}
.htab{padding:2px 6px;border-radius:3px;font-size:10px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.6);font-family:var(--font)}
.htab.on{background:rgba(255,255,255,.22);color:#fff;font-weight:500}
.hsp{flex:1}
.hbtn{padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:10px;cursor:pointer;font-family:var(--font);white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.15)}.hbtn.sv{background:rgba(255,255,255,.18)}
/* MAIN: left_sb | center_area | right_sb */
.main{display:grid;grid-template-columns:180px 1fr 196px;flex:1;overflow:hidden;min-height:0}
/* LEFT SIDEBAR */
.sb,.sbr{background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.sb{border-right:1px solid var(--border)}.sbr{border-left:1px solid var(--border)}
.pan{padding:7px 9px;border-bottom:1px solid var(--border)}
.plbl{font-size:9px;color:#999;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.tgr{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.tb{padding:4px 2px;border-radius:4px;border:1px solid var(--border);background:var(--grl);color:#555;font-size:9px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:var(--font)}
.tb svg{width:13px;height:13px}.tb.on{background:var(--bl);color:var(--blue);border-color:var(--blue);font-weight:700}
.pal{display:flex;flex-direction:column;gap:2px}
.pi{display:flex;align-items:center;gap:4px;padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:var(--grl);font-size:10px;cursor:grab;user-select:none}
.pi:hover{background:#eef4ff}
.pd{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:700;flex-shrink:0}
.cr{display:flex;align-items:center;gap:4px;font-size:10px;color:#666;margin-bottom:2px}
.cr input[type=color]{width:20px;height:16px;border:1px solid var(--border);border-radius:3px;padding:1px;cursor:pointer}
/* CENTER AREA: 上2小+下1大 */
.center{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.top-panes{display:grid;grid-template-columns:1fr 1fr;height:38%;flex-shrink:0;min-height:0}
.three-pane{flex:1;position:relative;overflow:hidden;min-height:0}
.pane2d{position:relative;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center}
.pane2d+.pane2d{border-left:2px solid #2d9e60}
.top-panes .pane2d{border-bottom:2px solid #2d9e60}
.pane-lbl{position:absolute;top:4px;left:6px;background:rgba(0,0,0,.72);color:#fff;font-size:8px;padding:2px 7px;border-radius:5px;z-index:5;pointer-events:none;white-space:nowrap}
canvas.edit{display:block;cursor:crosshair}
#threeCanvas{display:block;width:100%;height:100%}
/* 3D controls */
.ctrl-hint{position:absolute;top:4px;right:6px;background:rgba(0,0,0,.65);color:rgba(255,255,255,.65);font-size:8px;padding:2px 6px;border-radius:4px;z-index:5;pointer-events:none;line-height:1.6}
/* 3D camera buttons */
.cam-btns{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:10}
.cbtn{padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.6);color:rgba(255,255,255,.8);font-size:9px;cursor:pointer;border:1px solid rgba(255,255,255,.2);font-family:var(--font)}
.cbtn:hover{background:rgba(29,158,117,.7)}
/* ANIM BAR */
.abr{background:#152815;padding:5px 9px;display:flex;align-items:center;gap:5px;flex-shrink:0;border-top:1px solid #0a1e0a}
.abr input[type=range]{flex:1;accent-color:#2d9e60}
.ab{width:22px;height:22px;border-radius:4px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#7dd4a0;flex-shrink:0}
.ab:hover{background:rgba(255,255,255,.2)}.ab.pl{background:#2d9e60;color:#fff}
.slbl{font-size:10px;color:#7dd4a0;white-space:nowrap;min-width:34px}
/* RIGHT SIDEBAR */
.fld{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.fld label{font-size:9px;color:#999;font-weight:500}
.fld input,.fld textarea,.fld select{font-size:11px;padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:var(--grl);color:#222;font-family:var(--font);width:100%}
.fld textarea{resize:vertical;min-height:36px}
.bgs{display:flex;gap:2px;flex-wrap:wrap}
.bdg{display:inline-block;padding:1px 5px;border-radius:7px;font-size:8px;font-weight:700}
.bg{background:var(--gl);color:var(--green)}.bb{background:var(--bl);color:var(--blue)}.bo{background:var(--ol);color:var(--orange)}
.slist{display:flex;flex-direction:column;gap:2px;max-height:120px;overflow-y:auto}
.si{padding:3px 5px;border-radius:4px;border:1px solid var(--border);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;background:var(--grl)}
.si.on{background:var(--gl);border-color:var(--green);color:var(--green)}
.sn{width:14px;height:14px;border-radius:50%;background:#ddd;color:#666;font-size:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.si.on .sn{background:var(--green);color:#fff}
.sac{display:flex;gap:2px;margin-top:3px}
.sbt{flex:1;padding:3px;border-radius:4px;border:1px solid var(--border);background:var(--grl);font-size:10px;cursor:pointer;font-family:var(--font);color:#444}
.sbt:hover{background:var(--gl);color:var(--green);border-color:var(--green)}
.sbt.dl{flex:none;padding:3px 7px}.sbt.dl:hover{background:#fee;color:#c00;border-color:#c00}
.coord-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-bottom:3px}
.cbox{background:var(--grl);border:1px solid var(--border);border-radius:4px;padding:2px 3px;text-align:center}
.cbox label{display:block;font-size:8px;color:#999;margin-bottom:1px}
.cbox input{width:100%;border:none;background:transparent;font-size:10px;font-family:var(--font);color:#222;text-align:center;padding:0}
.cbox.cx{border-color:#e05010}.cbox.cy{border-color:#1a7a4a}.cbox.cz{border-color:#1a4a8a}
.svl{display:flex;flex-direction:column;gap:2px;max-height:110px;overflow-y:auto}
.svi{padding:4px 6px;border-radius:4px;border:1px solid var(--border);background:var(--grl);cursor:pointer}
.svi:hover{background:var(--gl);border-color:var(--green)}
.svn{font-size:11px;font-weight:500}
.ntf{position:fixed;bottom:12px;right:12px;background:var(--green);color:#fff;padding:6px 12px;border-radius:6px;font-size:11px;z-index:9999;opacity:0;transform:translateY(5px);transition:all .28s;pointer-events:none}
.ntf.show{opacity:1;transform:translateY(0)}
/* シャトル軌道モード表示 */
.shuttle-mode{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(255,100,0,.85);color:#fff;font-size:9px;padding:2px 8px;border-radius:5px;z-index:5;pointer-events:none;white-space:nowrap;display:none}
.shuttle-mode.show{display:block}
/* 節点ハンドル表示用 */
.node-hint{position:absolute;top:4px;right:6px;background:rgba(0,100,200,.8);color:#fff;font-size:8px;padding:2px 6px;border-radius:4px;z-index:5;pointer-events:none;display:none}
.node-hint.show{display:block}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">SHUTTLE BOARD <em>3D</em></div>
  <div class="htabs" id="mt"><button class="htab on" onclick="setMatch('singles',this)">シングルス</button><button class="htab" onclick="setMatch('doubles',this)">ダブルス</button></div>
  <div class="htabs" id="tt"><button class="htab on" onclick="setType('tech',this)">技術</button><button class="htab" onclick="setType('knock',this)">ノック</button><button class="htab" onclick="setType('pattern',this)">パターン</button></div>
  <div class="htabs" id="ct"><button class="htab on" onclick="setCat('basic',this)">基礎</button><button class="htab" onclick="setCat('tactic',this)">戦術</button><button class="htab" onclick="setCat('scene',this)">場面</button><button class="htab" onclick="setCat('match',this)">実践</button></div>
  <div class="hsp"></div>
  <button class="hbtn" onclick="clearAll()">🗑</button>
  <button class="hbtn sv" onclick="saveDrill()">💾 保存</button>
</div>

<div class="main">
<!-- LEFT -->
<div class="sb">
  <div class="pan">
    <div class="plbl">ツール</div>
    <div class="tgr">
      <button class="tb on" id="tsel" onclick="setTool('select',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7z"/></svg>選択</button>
      <button class="tb" id="tpl" onclick="setTool('player',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>選手</button>
      <button class="tb" id="tsh" onclick="setTool('shuttle',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19l14-14M19 5l-4 10-6-6z"/></svg>シャトル</button>
      <button class="tb" id="tmv" onclick="setTool('move',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>移動軌道</button>
      <button class="tb" id="tcm" onclick="setTool('comment',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="13" rx="2"/><path d="M8 21l4-5h5"/></svg>コメント</button>
      <button class="tb" id="ter" onclick="setTool('erase',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-3 3"/><path d="M6 11l7 7"/></svg>消去</button>
    </div>
    <!-- シャトルモード説明 -->
    <div id="shuttleHelp" style="display:none;margin-top:5px;font-size:9px;color:#888;line-height:1.5;background:#f0f0f0;padding:4px;border-radius:4px">
      <b style="color:#e05010">シャトル軌道</b><br>
      ①真上：始点→終点をドラッグ<br>
      ②サイド：10節点をドラッグで弧調整
    </div>
  </div>
  <div class="pan"><div class="plbl">選手パレット</div><div class="pal" id="palette"></div></div>
  <div class="pan">
    <div class="plbl">軌道の色</div>
    <div class="cr"><span>シャトル</span><input type="color" id="sCol" value="#ff4400"></div>
    <div class="cr"><span>移動</span><input type="color" id="mCol" value="#0055ee"></div>
  </div>
</div>

<!-- CENTER -->
<div class="center">
  <div class="top-panes">
    <!-- 真上 -->
    <div class="pane2d" id="paneTop">
      <div class="pane-lbl" id="lblTop">📐 真上 — X・Z編集</div>
      <canvas id="cTop" class="edit"></canvas>
      <div class="shuttle-mode" id="shuttleModeTop">🏸 シャトル: 始点→終点をドラッグ</div>
    </div>
    <!-- サイド -->
    <div class="pane2d" id="paneSide">
      <div class="pane-lbl">↔ サイド — Y（高さ）編集</div>
      <canvas id="cSide" class="edit"></canvas>
      <div class="shuttle-mode" id="shuttleModeSide">🎯 節点をドラッグして弧を調整</div>
      <div class="node-hint" id="nodeHint">節点: ドラッグで弧を調整</div>
    </div>
  </div>
  <!-- 3D -->
  <div class="three-pane" id="pane3d">
    <div class="pane-lbl">🔄 3Dビュー</div>
    <div class="ctrl-hint">左ドラッグ:回転 / 右ドラッグ:パン / ホイール:ズーム</div>
    <div id="threeContainer" style="width:100%;height:100%"></div>
    <div class="cam-btns">
      <button class="cbtn" onclick="setCam('free')">🔄 自由</button>
      <button class="cbtn" onclick="setCam('top')">📐 真上</button>
      <button class="cbtn" onclick="setCam('side')">↔ サイド</button>
      <button class="cbtn" onclick="setCam('front')">🏸 正面</button>
    </div>
  </div>
  <!-- ANIM BAR -->
  <div class="abr">
    <button class="ab" onclick="prevStep()">◀</button>
    <input type="range" id="slider" min="0" max="0" value="0" oninput="goStep(+this.value)">
    <button class="ab" onclick="nextStep()">▶</button>
    <button class="ab" id="pbtn" onclick="togglePlay()">▶</button>
    <span class="slbl" id="slbl">1 / 1</span>
  </div>
</div>

<!-- RIGHT -->
<div class="sbr">
  <div class="pan">
    <div class="plbl">練習情報</div>
    <div class="fld"><label>練習名</label><input type="text" id="dn" placeholder="例：クリア→スマッシュ"></div>
    <div class="fld"><label>目的</label><textarea id="dd" placeholder="目的・注意点..."></textarea></div>
    <div class="bgs"><span class="bdg bg" id="bm">シングルス</span><span class="bdg bb" id="bt">技術</span><span class="bdg bo" id="bc">基礎</span></div>
  </div>
  <div class="pan">
    <div class="plbl">選択中の要素</div>
    <div id="prop"><div style="font-size:9px;color:#aaa">要素を選択してください<br><small>真上:X/Z ／ サイド:Y(高さ)</small></div></div>
  </div>
  <div class="pan">
    <div class="plbl">ステップ管理</div>
    <div class="slist" id="slist"></div>
    <div class="sac"><button class="sbt" onclick="addStep()">＋</button><button class="sbt" onclick="dupStep()">⧉</button><button class="sbt dl" onclick="delStep()">✕</button></div>
  </div>
  <div class="pan" style="flex:1">
    <div class="plbl">保存済み</div>
    <div class="svl" id="svl"><div style="font-size:10px;color:#aaa">読み込み中...</div></div>
  </div>
</div>
</div>

<div class="ntf" id="ntf"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,getDocs,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyB6TbrWqu2CAzggiCqzcvr06mwnDOdEZk4",authDomain:"seikyobadomintonmanager.firebaseapp.com",projectId:"seikyobadomintonmanager",storageBucket:"seikyobadomintonmanager.firebasestorage.app",messagingSenderId:"86245954924",appId:"1:86245954924:web:2eed89af19e5af4afb4f49"};
const app=initializeApp(cfg);const db=getFirestore(app);
document.getElementById('fbDot')&&(document.getElementById('fbDot').style.background='#2d9e60');
const TM={tech:'技術',knock:'ノック',pattern:'パターン'};
const CM={basic:'基礎',tactic:'戦術',scene:'場面',match:'実践'};
const MM={singles:'シングルス',doubles:'ダブルス'};
async function load(){
  try{
    const snap=await getDocs(query(collection(db,'drills'),orderBy('createdAt','desc')));
    const el=document.getElementById('svl');el.innerHTML='';
    if(snap.empty){el.innerHTML='<div style="font-size:10px;color:#aaa">まだ保存されていません</div>';return;}
    snap.forEach(d=>{
      const data=d.data();const div=document.createElement('div');div.className='svi';
      div.innerHTML='<div class="svn">'+(data.name||'無題')+'</div><div style="display:flex;gap:2px;margin-top:2px"><span class="bdg bg">'+(MM[data.match]||'')+'</span><span class="bdg bb">'+(TM[data.type]||'')+'</span><span class="bdg bo">'+(CM[data.cat]||'')+'</span></div>';
      div.onclick=()=>{window._steps=JSON.parse(JSON.stringify(data.steps));window._cs=0;window.setMatch(data.match);window.setType(data.type);window.setCat(data.cat);document.getElementById('dn').value=data.name||'';document.getElementById('dd').value=data.desc||'';window.renderSteps();window.drawAll();window.update3D();window.notify('「'+data.name+'」を読み込みました');};
      el.appendChild(div);
    });
  }catch(e){document.getElementById('svl').innerHTML='<div style="font-size:10px;color:#c00">読み込みエラー</div>';}
}
window._fbSave=async(data)=>{try{data.createdAt=serverTimestamp();await addDoc(collection(db,'drills'),data);window.notify('Firebaseに保存しました！');load();}catch(e){window.notify('保存エラー: '+e.message);}};
load();
</script>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 座標系: X=幅0-6.1m  Y=高さ0-9m  Z=奥行0-13.4m
// ネット: Z=6.7m
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CW=6.1,CL=13.4,NET_Z=6.7,NET_HC=1.524,NET_HP=1.55;
const N_NODES=10; // シャトル軌道の節点数

// Canvas
const CT=document.getElementById('cTop'),XT=CT.getContext('2d');
const CS=document.getElementById('cSide'),XS=CS.getContext('2d');

// State
let tool='select',match='singles',type='tech',cat='basic';
let isDown=false,dragging=false,selEl=null,dragPl=null,activeC=null;
let animT=null,playing=false;

// シャトル描画の状態管理
// phase: 'top' = 真上で始点→終点を引く中
//        'side' = サイドで節点を調整中
// pendingShuttle: 現在編集中のシャトル
let shuttlePhase=null; // null | 'drawing_top' | 'nodes_side'
let pendingShuttleIdx=-1; // 編集中のシャトルのindex
let dragNodeIdx=-1; // サイドでドラッグ中の節点index
let topDragStart=null; // 真上での始点

const PDEFS=[
  {id:'A',label:'A',color:'#1a7a4a',name:'A面（緑）'},
  {id:'B',label:'B',color:'#1a4a8a',name:'B面（青）'},
  {id:'C',label:'C',color:'#c85a0a',name:'C面（橙）'},
  {id:'D',label:'D',color:'#8b1a8b',name:'D面（紫）'},
  {id:'E',label:'E',color:'#b00020',name:'E面（赤）'},
  {id:'F',label:'F',color:'#555',   name:'F面（灰）'},
];
window.PDEFS=PDEFS;

(()=>{const pal=document.getElementById('palette');
  PDEFS.forEach(p=>{const d=document.createElement('div');d.className='pi';d.draggable=true;
    d.innerHTML=`<div class="pd" style="background:${p.color}">${p.id}</div>${p.name}`;
    d.ondragstart=()=>dragPl={...p};pal.appendChild(d);});
})();

// Data
window._steps=[{label:'ステップ 1',
  players:[{id:'A',label:'A',color:'#1a7a4a',x:3.05,y:0,z:10.5},{id:'B',label:'B',color:'#1a4a8a',x:3.05,y:0,z:3.0}],
  shuttles:[],moves:[],comments:[]}];
window._cs=0;
const D=()=>window._steps[window._cs];

// ━━━━ シャトル軌道データ構造 ━━━━
// shuttle = {
//   color: string,
//   x0,z0: 始点XZ,  x1,z1: 終点XZ,  (真上で決定)
//   nodes: [{x,y,z}] × N_NODES  (N_NODESの節点、サイドで調整)
// }

// 始点→終点から初期節点を生成（放物線弧）
function makeShuttleNodes(x0,z0,x1,z1,peakY){
  const nodes=[];
  for(let i=0;i<N_NODES;i++){
    const t=(i+1)/(N_NODES+1); // 0<t<1 (始点・終点は含まない)
    const x=x0+t*(x1-x0);
    const z=z0+t*(z1-z0);
    const y=peakY*4*t*(1-t); // 放物線
    nodes.push({x,y,z});
  }
  return nodes;
}

// ━━━━ 2D座標変換 ━━━━
// 真上: IMG_TOPの実際のコート位置に合わせたマッピング
function topMap(x,z,W,H){
  const iW=700,iH=1254,sc=Math.min(W/iW,H/iH);
  const dx=(W-iW*sc)/2,dy=(H-iH*sc)/2;
  const cL=101.2*sc,cR=597.9*sc,cT=150.4*sc,cB=1087.2*sc;
  return{px:dx+cL+x*(cR-cL)/CW, py:dy+cB-z*(cB-cT)/CL};
}
function topInv(px,py,W,H){
  const iW=700,iH=1254,sc=Math.min(W/iW,H/iH);
  const dx=(W-iW*sc)/2,dy=(H-iH*sc)/2;
  const cL=101.2*sc,cR=597.9*sc,cT=150.4*sc,cB=1087.2*sc;
  return{x:(px-dx-cL)*CW/(cR-cL), z:(dy+cB-py)*CL/(cB-cT)};
}
// サイド: Z軸が横、Y軸が縦
function sideMap(z,y,W,H){const pz=52,pb=32,pt=14;return{px:pz+z*(W-pz-18)/CL,py:H-pb-y*(H-pb-pt)/9};}
function sideInv(px,py,W,H){const pz=52,pb=32,pt=14;return{z:(px-pz)*(CL/(W-pz-18)),y:(H-pb-py)*(9/(H-pb-pt))};}

// ━━━━ ヒットテスト ━━━━
function hitPl(px,py,cv,isTop){const W=cv.width,H=cv.height;return D().players.findIndex(p=>{const m=isTop?topMap(p.x,p.z,W,H):sideMap(p.z,p.y,W,H);return Math.hypot(m.px-px,m.py-py)<15;});}
function hitCm(px,py,cv,isTop){const W=cv.width,H=cv.height;return D().comments.findIndex(c=>{const m=isTop?topMap(c.x,c.z,W,H):sideMap(c.z,c.y,W,H);return Math.abs(m.px-px)<52&&Math.abs(m.py-py)<13;});}
function hitNode(px,py,cv,shuttleIdx){
  // サイドビューで節点をヒット
  const W=cv.width,H=cv.height;
  const s=D().shuttles[shuttleIdx];if(!s||!s.nodes)return -1;
  for(let i=0;i<s.nodes.length;i++){
    const n=s.nodes[i];const m=sideMap(n.z,n.y,W,H);
    if(Math.hypot(m.px-px,m.py-py)<10)return i;
  }
  return -1;
}

// ━━━━ マウスイベント ━━━━
function gp(e,cv){const r=cv.getBoundingClientRect();return{px:(e.clientX-r.left)*(cv.width/r.width),py:(e.clientY-r.top)*(cv.height/r.height)};}
function clamp3(r){return{x:Math.max(0,Math.min(CW,r.x??CW/2)),y:Math.max(0,Math.min(9,r.y??0)),z:Math.max(0,Math.min(CL,r.z??CL/2))};}

// ─ 真上 mousedown ─
CT.onmousedown=e=>{
  const {px,py}=gp(e,CT);const W=CT.width,H=CT.height;const d=D();
  isDown=true;activeC=CT;

  if(tool==='shuttle'){
    // フェーズ1: 真上で始点を記録
    const r=topInv(px,py,W,H);
    topDragStart={...clamp3({...r,y:0})};
    shuttlePhase='drawing_top';
    return;
  }
  if(tool==='select'){
    // 選手・コメントのヒットテスト
    const pi=hitPl(px,py,CT,true);
    if(pi>=0){selEl={type:'player',idx:pi};showProp();dragging=true;drawAll();update3D();return;}
    const ci=hitCm(px,py,CT,true);
    if(ci>=0){selEl={type:'comment',idx:ci};showProp();dragging=true;drawAll();update3D();return;}
    // シャトル軌道のヒット（真上）
    for(let i=0;i<d.shuttles.length;i++){
      const s=d.shuttles[i];if(!s.nodes)continue;
      const all=[{x:s.x0,z:s.z0},...s.nodes,{x:s.x1,z:s.z1}];
      if(all.some(p=>{const m=topMap(p.x,p.z,W,H);return Math.hypot(m.px-px,m.py-py)<12;})){
        selEl={type:'shuttle',idx:i};showProp();drawAll();
        // サイド節点編集モードへ
        pendingShuttleIdx=i;shuttlePhase='nodes_side';
        updateShuttleHints();return;
      }
    }
    selEl=null;showProp();drawAll();
    return;
  }
  if(tool==='player'){
    const r=topInv(px,py,W,H);d.players.push({...PDEFS[0],...clamp3({...r,y:0})});drawAll();update3D();return;
  }
  if(tool==='move'){
    const r=topInv(px,py,W,H);d.moves.push({color:document.getElementById('mCol').value,pts:[clamp3({...r,y:0})]});return;
  }
  if(tool==='comment'){
    const tx=prompt('コメントを入力:');if(!tx)return;
    const r=topInv(px,py,W,H);d.comments.push({text:tx,...clamp3({...r,y:0})});drawAll();update3D();return;
  }
  if(tool==='erase'){
    const pi=hitPl(px,py,CT,true);if(pi>=0){d.players.splice(pi,1);drawAll();update3D();return;}
    const ci=hitCm(px,py,CT,true);if(ci>=0){d.comments.splice(ci,1);drawAll();update3D();return;}
    for(let i=0;i<d.shuttles.length;i++){
      const s=d.shuttles[i];if(!s.nodes)continue;
      const all=[{x:s.x0,z:s.z0},...s.nodes,{x:s.x1,z:s.z1}];
      if(all.some(p=>{const m=topMap(p.x,p.z,W,H);return Math.hypot(m.px-px,m.py-py)<14;})){
        d.shuttles.splice(i,1);if(pendingShuttleIdx===i){pendingShuttleIdx=-1;shuttlePhase=null;}drawAll();update3D();return;
      }
    }
    for(let i=0;i<d.moves.length;i++){
      if(d.moves[i].pts.some(p=>{const m=topMap(p.x,p.z,W,H);return Math.hypot(m.px-px,m.py-py)<14;})){d.moves.splice(i,1);drawAll();return;}
    }
  }
};

CT.onmousemove=e=>{
  if(!isDown||activeC!==CT)return;
  const {px,py}=gp(e,CT);const W=CT.width,H=CT.height;const d=D();
  if(tool==='shuttle'&&shuttlePhase==='drawing_top'){
    drawAll(); // ラバーバンド描画
    const r=topInv(px,py,W,H);
    const cur=clamp3({...r,y:0});
    // 暫定線を描画
    if(topDragStart){
      const s=topMap(topDragStart.x,topDragStart.z,W,H);
      const e2=topMap(cur.x,cur.z,W,H);
      XT.strokeStyle=document.getElementById('sCol').value;XT.lineWidth=2;XT.setLineDash([5,4]);
      XT.beginPath();XT.moveTo(s.px,s.py);XT.lineTo(e2.px,e2.py);XT.stroke();XT.setLineDash([]);
      // 矢印
      const a=Math.atan2(e2.py-s.py,e2.px-s.px);
      XT.fillStyle=document.getElementById('sCol').value;XT.beginPath();
      XT.moveTo(e2.px+Math.cos(a)*10,e2.py+Math.sin(a)*10);
      XT.lineTo(e2.px+Math.cos(a-2.5)*6,e2.py+Math.sin(a-2.5)*6);
      XT.lineTo(e2.px+Math.cos(a+2.5)*6,e2.py+Math.sin(a+2.5)*6);
      XT.closePath();XT.fill();
    }
    return;
  }
  if(tool==='select'&&dragging&&selEl){
    if(selEl.type==='player'){const r=topInv(px,py,W,H);const p=d.players[selEl.idx];p.x=Math.max(0,Math.min(CW,r.x));p.z=Math.max(0,Math.min(CL,r.z));}
    else if(selEl.type==='comment'){const r=topInv(px,py,W,H);const c=d.comments[selEl.idx];c.x=r.x;c.z=r.z;}
    showProp();drawAll();update3D();return;
  }
  if(tool==='move'&&d.moves.length>0){
    const r=topInv(px,py,W,H);const prev=d.moves[d.moves.length-1].pts.slice(-1)[0]||{};
    d.moves[d.moves.length-1].pts.push({...r,y:prev.y??0});drawAll();return;
  }
};

CT.onmouseup=e=>{
  if(activeC!==CT){isDown=false;dragging=false;activeC=null;return;}
  const {px,py}=gp(e,CT);const W=CT.width,H=CT.height;const d=D();
  if(tool==='shuttle'&&shuttlePhase==='drawing_top'&&topDragStart){
    const r=topInv(px,py,W,H);const end=clamp3({...r,y:0});
    const dist=Math.hypot(end.x-topDragStart.x,end.z-topDragStart.z);
    if(dist>0.3){
      // 放物線の高さを距離に応じて自動設定（長い軌道ほど高く）
      const peakY=Math.min(5,Math.max(1,dist*0.5));
      const nodes=makeShuttleNodes(topDragStart.x,topDragStart.z,end.x,end.z,peakY);
      const s={color:document.getElementById('sCol').value,x0:topDragStart.x,z0:topDragStart.z,x1:end.x,z1:end.z,nodes};
      d.shuttles.push(s);
      pendingShuttleIdx=d.shuttles.length-1;
      shuttlePhase='nodes_side'; // サイドで調整フェーズへ
      selEl={type:'shuttle',idx:pendingShuttleIdx};
      showProp();
      updateShuttleHints();
    } else {
      shuttlePhase=null;topDragStart=null;
    }
  }
  isDown=false;dragging=false;activeC=null;
  drawAll();update3D();
};
CT.onmouseleave=()=>{if(activeC===CT&&tool==='shuttle'&&shuttlePhase==='drawing_top'){isDown=false;dragging=false;activeC=null;}};

// ─ サイド mousedown ─
CS.onmousedown=e=>{
  const {px,py}=gp(e,CS);const W=CS.width,H=CS.height;const d=D();
  isDown=true;activeC=CS;
  if(tool==='shuttle'&&shuttlePhase==='nodes_side'&&pendingShuttleIdx>=0){
    // 節点のヒットテスト
    const ni=hitNode(px,py,CS,pendingShuttleIdx);
    if(ni>=0){dragNodeIdx=ni;return;}
    return;
  }
  if(tool==='select'){
    const pi=hitPl(px,py,CS,false);
    if(pi>=0){selEl={type:'player',idx:pi};showProp();dragging=true;drawAll();update3D();return;}
    // シャトル軌道の節点選択
    for(let i=0;i<d.shuttles.length;i++){
      const ni=hitNode(px,py,CS,i);
      if(ni>=0){selEl={type:'shuttle',idx:i};pendingShuttleIdx=i;shuttlePhase='nodes_side';dragNodeIdx=ni;showProp();drawAll();return;}
    }
    selEl=null;showProp();drawAll();
  }
};

CS.onmousemove=e=>{
  if(!isDown||activeC!==CS)return;
  const {px,py}=gp(e,CS);const W=CS.width,H=CS.height;const d=D();
  if((tool==='shuttle'||tool==='select')&&shuttlePhase==='nodes_side'&&pendingShuttleIdx>=0&&dragNodeIdx>=0){
    const r=sideInv(px,py,W,H);
    const s=d.shuttles[pendingShuttleIdx];if(!s||!s.nodes)return;
    // Y（高さ）のみ変更（Z位置は固定）
    s.nodes[dragNodeIdx].y=Math.max(0,Math.min(9,r.y));
    drawAll();update3D();return;
  }
  if(tool==='select'&&dragging&&selEl){
    if(selEl.type==='player'){const r=sideInv(px,py,W,H);const p=d.players[selEl.idx];p.z=Math.max(0,Math.min(CL,r.z));p.y=Math.max(0,Math.min(9,r.y));}
    showProp();drawAll();update3D();
  }
};

CS.onmouseup=()=>{dragNodeIdx=-1;isDown=false;dragging=false;activeC=null;};
CS.onmouseleave=()=>{dragNodeIdx=-1;if(activeC===CS){isDown=false;dragging=false;activeC=null;}};

// ドロップ
CT.ondrop=e=>{e.preventDefault();if(!dragPl)return;const{px,py}=gp(e,CT);const r=topInv(px,py,CT.width,CT.height);D().players.push({...dragPl,...clamp3({...r,y:0})});dragPl=null;drawAll();update3D();};
CS.ondrop=e=>{e.preventDefault();if(!dragPl)return;const{px,py}=gp(e,CS);const r=sideInv(px,py,CS.width,CS.height);D().players.push({...dragPl,...clamp3({x:CW/2,...r})});dragPl=null;drawAll();update3D();};
[CT,CS].forEach(c=>c.ondragover=e=>e.preventDefault());

// ━━━━ UI ━━━━
const TM2={tech:'技術',knock:'ノック',pattern:'パターン'};
const CM2={basic:'基礎',tactic:'戦術',scene:'場面',match:'実践'};
const MM2={singles:'シングルス',doubles:'ダブルス'};
window.notify=msg=>{const n=document.getElementById('ntf');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2600);};
function swTab(g,b){g.querySelectorAll('.htab').forEach(x=>x.classList.remove('on'));if(b)b.classList.add('on');}
window.setMatch=(m,b)=>{match=m;if(b)swTab(document.getElementById('mt'),b);document.getElementById('bm').textContent=MM2[m];};
window.setType=(t,b)=>{type=t;if(b)swTab(document.getElementById('tt'),b);document.getElementById('bt').textContent=TM2[t];};
window.setCat=(c,b)=>{cat=c;if(b)swTab(document.getElementById('ct'),b);document.getElementById('bc').textContent=CM2[c];};
function setTool(t,b){
  tool=t;document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));if(b)b.classList.add('on');
  [CT,CS].forEach(c=>c.style.cursor=t==='erase'?'not-allowed':t==='select'?'default':'crosshair');
  document.getElementById('shuttleHelp').style.display=t==='shuttle'?'block':'none';
  if(t!=='shuttle'){shuttlePhase=null;topDragStart=null;}
  updateShuttleHints();
}
window.setTool=setTool;

function updateShuttleHints(){
  const topHint=document.getElementById('shuttleModeTop');
  const sideHint=document.getElementById('shuttleModeSide');
  const nodeHint=document.getElementById('nodeHint');
  if(tool==='shuttle'){
    if(shuttlePhase==='drawing_top'||!shuttlePhase){topHint.classList.add('show');sideHint.classList.remove('show');nodeHint.classList.remove('show');}
    else if(shuttlePhase==='nodes_side'){topHint.classList.remove('show');sideHint.classList.add('show');nodeHint.classList.add('show');}
  } else {
    topHint.classList.remove('show');sideHint.classList.remove('show');
    if(shuttlePhase==='nodes_side')nodeHint.classList.add('show');
    else nodeHint.classList.remove('show');
  }
}

function showProp(){
  const el=document.getElementById('prop');
  if(!selEl){el.innerHTML='<div style="font-size:9px;color:#aaa">要素を選択してください<br><small>真上:X/Z ／ サイド:Y(高さ)</small></div>';return;}
  if(selEl.type==='player'){
    const p=D().players[selEl.idx];
    const opts=PDEFS.map(pd=>`<option value="${pd.id}" ${p.id===pd.id?'selected':''}>${pd.id} ${pd.name}</option>`).join('');
    el.innerHTML=`<div class="fld"><label>選手</label><select onchange="(function(v){const pd=window.PDEFS.find(x=>x.id===v);if(pd){const pp=D().players[selEl.idx];pp.id=pd.id;pp.color=pd.color;pp.label=pd.label;drawAll();update3D();showProp();}})(this.value)">${opts}</select></div>
      <div class="fld"><label>ラベル</label><input type="text" value="${p.label}" oninput="D().players[selEl.idx].label=this.value;drawAll();update3D()"></div>
      <div class="coord-grid">
        <div class="cbox cx"><label>X m</label><input type="number" step="0.1" min="0" max="6.1" value="${p.x.toFixed(2)}" oninput="D().players[selEl.idx].x=Math.max(0,Math.min(6.1,+this.value));drawAll();update3D()"></div>
        <div class="cbox cy"><label>Y m</label><input type="number" step="0.05" min="0" max="9" value="${p.y.toFixed(2)}" oninput="D().players[selEl.idx].y=Math.max(0,Math.min(9,+this.value));drawAll();update3D()"></div>
        <div class="cbox cz"><label>Z m</label><input type="number" step="0.1" min="0" max="13.4" value="${p.z.toFixed(2)}" oninput="D().players[selEl.idx].z=Math.max(0,Math.min(13.4,+this.value));drawAll();update3D()"></div>
      </div>
      <div class="fld"><label>色</label><input type="color" value="${p.color}" style="height:20px;padding:1px" oninput="D().players[selEl.idx].color=this.value;drawAll();update3D()"></div>`;
  } else if(selEl.type==='shuttle'){
    const s=D().shuttles[selEl.idx];
    el.innerHTML=`<div style="font-size:9px;color:#555;line-height:1.6"><b>シャトル軌道</b><br>始点: (${s.x0?.toFixed(1)},${s.z0?.toFixed(1)})<br>終点: (${s.x1?.toFixed(1)},${s.z1?.toFixed(1)})<br>節点数: ${s.nodes?.length||0}<br><small style="color:#888">サイドビューで各節点をドラッグして弧を調整</small></div>
      <div class="fld" style="margin-top:4px"><label>色</label><input type="color" value="${s.color}" style="height:20px;padding:1px" oninput="D().shuttles[selEl.idx].color=this.value;drawAll();update3D()"></div>
      <button onclick="resetShuttleArc(${selEl.idx})" style="margin-top:4px;width:100%;padding:3px;border-radius:4px;border:1px solid var(--border);background:var(--grl);font-size:10px;cursor:pointer">↩ 弧をリセット</button>`;
  } else if(selEl.type==='comment'){
    const c=D().comments[selEl.idx];
    el.innerHTML=`<div class="fld"><label>コメント</label><input type="text" value="${c.text}" oninput="D().comments[selEl.idx].text=this.value;drawAll();update3D()"></div>`;
  }
}

function resetShuttleArc(idx){
  const s=D().shuttles[idx];if(!s)return;
  const dist=Math.hypot(s.x1-s.x0,s.z1-s.z0);
  const peakY=Math.min(5,Math.max(1,dist*0.5));
  s.nodes=makeShuttleNodes(s.x0,s.z0,s.x1,s.z1,peakY);
  drawAll();update3D();
}

// ━━━━ ステップ管理 ━━━━
window.renderSteps=function(){
  const el=document.getElementById('slist');el.innerHTML='';
  window._steps.forEach((s,i)=>{const d=document.createElement('div');d.className='si'+(i===window._cs?' on':'');
    d.innerHTML=`<div class="sn">${i+1}</div><span>${s.label}</span>`;
    d.onclick=()=>{window._cs=i;window.renderSteps();drawAll();update3D();syncSl();};el.appendChild(d);});
  syncSl();
};
function syncSl(){const sl=document.getElementById('slider');sl.max=window._steps.length-1;sl.value=window._cs;document.getElementById('slbl').textContent=(window._cs+1)+' / '+window._steps.length;}
function addStep(){const p=window._steps[window._cs];window._steps.push({label:'ステップ '+(window._steps.length+1),players:JSON.parse(JSON.stringify(p.players)),shuttles:[],moves:[],comments:[]});window._cs=window._steps.length-1;window.renderSteps();drawAll();update3D();}
function dupStep(){const s=window._steps[window._cs];const c=JSON.parse(JSON.stringify(s));c.label=s.label+' (複製)';window._steps.splice(window._cs+1,0,c);window._cs++;window.renderSteps();drawAll();update3D();}
function delStep(){if(window._steps.length<=1){window.notify('最低1ステップ必要です');return;}window._steps.splice(window._cs,1);if(window._cs>=window._steps.length)window._cs--;window.renderSteps();drawAll();update3D();}
function goStep(i){window._cs=i;window.renderSteps();drawAll();update3D();}
window.goStep=goStep;
function prevStep(){if(window._cs>0){window._cs--;window.renderSteps();drawAll();update3D();syncSl();}}
function nextStep(){if(window._cs<window._steps.length-1){window._cs++;window.renderSteps();drawAll();update3D();syncSl();}}
function togglePlay(){playing=!playing;const b=document.getElementById('pbtn');b.classList.toggle('pl',playing);b.textContent=playing?'⏸':'▶';if(playing){animT=setInterval(()=>{if(window._cs>=window._steps.length-1){playing=false;b.classList.remove('pl');b.textContent='▶';clearInterval(animT);return;}window._cs++;window.renderSteps();drawAll();update3D();syncSl();},1100);}else clearInterval(animT);}
function saveDrill(){const name=document.getElementById('dn').value.trim()||'無題';const desc=document.getElementById('dd').value.trim();if(window._fbSave)window._fbSave({name,desc,match,type,cat,steps:JSON.parse(JSON.stringify(window._steps))});else window.notify('Firebase未接続');}
function clearAll(){if(!confirm('クリアしますか？'))return;window._steps=[{label:'ステップ 1',players:[{id:'A',label:'A',color:'#1a7a4a',x:3.05,y:0,z:10.5},{id:'B',label:'B',color:'#1a4a8a',x:3.05,y:0,z:3.0}],shuttles:[],moves:[],comments:[]}];window._cs=0;selEl=null;shuttlePhase=null;pendingShuttleIdx=-1;window.renderSteps();drawAll();update3D();window.notify('クリアしました');}
window.addStep=addStep;window.dupStep=dupStep;window.delStep=delStep;
window.prevStep=prevStep;window.nextStep=nextStep;window.togglePlay=togglePlay;
window.saveDrill=saveDrill;window.clearAll=clearAll;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 2D DRAW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const IMG_TOP=new Image();let TOP_READY=false;
IMG_TOP.onload=()=>{TOP_READY=true;drawAll();};

function drawAll(){drawTopView();drawSideView();}
window.drawAll=drawAll;

function drawTopView(){
  const W=CT.width,H=CT.height;XT.clearRect(0,0,W,H);
  if(TOP_READY){const iW=700,iH=1254,sc=Math.min(W/iW,H/iH),dw=iW*sc,dh=iH*sc,dx=(W-dw)/2,dy=(H-dh)/2;XT.drawImage(IMG_TOP,dx,dy,dw,dh);}
  else{XT.fillStyle='#3a6a30';XT.fillRect(0,0,W,H);}
  const d=D();
  // 移動軌道
  d.moves.forEach(m=>{
    const pts=m.pts.map(p=>topMap(p.x,p.z,W,H));if(pts.length<2)return;
    XT.strokeStyle=m.color;XT.lineWidth=2;XT.setLineDash([8,5]);
    XT.beginPath();pts.forEach((p,i)=>i?XT.lineTo(p.px,p.py):XT.moveTo(p.px,p.py));XT.stroke();XT.setLineDash([]);
    arrowHead2D(XT,pts,m.color);
  });
  // シャトル軌道（真上: 始点→終点の直線＋節点表示）
  d.shuttles.forEach((s,si)=>{
    if(!s.nodes)return;
    const p0=topMap(s.x0,s.z0,W,H),p1=topMap(s.x1,s.z1,W,H);
    const isSel=selEl&&selEl.type==='shuttle'&&selEl.idx===si;
    // 直線
    XT.strokeStyle=s.color;XT.lineWidth=isSel?3:2;XT.setLineDash([]);
    XT.globalAlpha=0.8;
    XT.beginPath();XT.moveTo(p0.px,p0.py);XT.lineTo(p1.px,p1.py);XT.stroke();
    XT.globalAlpha=1;
    // 矢印
    const a=Math.atan2(p1.py-p0.py,p1.px-p0.px);
    XT.fillStyle=s.color;XT.beginPath();
    XT.moveTo(p1.px+Math.cos(a)*9,p1.py+Math.sin(a)*9);
    XT.lineTo(p1.px+Math.cos(a-2.4)*6,p1.py+Math.sin(a-2.4)*6);
    XT.lineTo(p1.px+Math.cos(a+2.4)*6,p1.py+Math.sin(a+2.4)*6);
    XT.closePath();XT.fill();
    // 始点マーカー
    XT.fillStyle=s.color;XT.beginPath();XT.arc(p0.px,p0.py,4,0,Math.PI*2);XT.fill();
    // 終点マーカー
    XT.strokeStyle=s.color;XT.lineWidth=2;XT.beginPath();XT.arc(p1.px,p1.py,4,0,Math.PI*2);XT.stroke();
    // 選択時: 節点も表示
    if(isSel){
      s.nodes.forEach(n=>{
        const np=topMap(n.x,n.z,W,H);
        XT.fillStyle='rgba(255,255,255,0.6)';XT.strokeStyle=s.color;XT.lineWidth=1;
        XT.beginPath();XT.arc(np.px,np.py,3,0,Math.PI*2);XT.fill();XT.stroke();
      });
    }
  });
  // 選手
  drawPlayers2D(XT,W,H,true);
  // コメント
  drawComments2D(XT,W,H,true);
}

function drawSideView(){
  const W=CS.width,H=CS.height;XS.clearRect(0,0,W,H);
  drawSideBG(XS,W,H);
  const d=D();
  // シャトル軌道（サイド: 節点を繋ぐ滑らかな曲線）
  d.shuttles.forEach((s,si)=>{
    if(!s.nodes)return;
    const isSel=selEl&&selEl.type==='shuttle'&&selEl.idx===si;
    const isPending=si===pendingShuttleIdx&&shuttlePhase==='nodes_side';
    // 全点（始点+節点+終点）でCatmullRomスプライン
    const allPts=[{x:s.x0,y:0,z:s.z0},...s.nodes,{x:s.x1,y:0,z:s.z1}];
    const mapped=allPts.map(p=>sideMap(p.z,p.y,W,H));
    // スプライン描画
    XS.strokeStyle=s.color;XS.lineWidth=isSel?3:2.5;XS.setLineDash([]);
    drawCatmullRom(XS,mapped);
    // 矢印
    if(mapped.length>=2)arrowHead2D(XS,mapped.slice(-2),s.color);
    // 節点ハンドル
    if(isSel||isPending){
      s.nodes.forEach((n,ni)=>{
        const m=sideMap(n.z,n.y,W,H);
        const isDrag=ni===dragNodeIdx&&isPending;
        XS.fillStyle=isDrag?s.color:'rgba(255,255,255,0.9)';
        XS.strokeStyle=s.color;XS.lineWidth=isDrag?2:1.5;
        XS.beginPath();XS.arc(m.px,m.py,isDrag?7:5,0,Math.PI*2);XS.fill();XS.stroke();
        // 縦の高さガイドライン
        const fl=sideMap(n.z,0,W,H);
        XS.strokeStyle='rgba(255,100,0,0.2)';XS.lineWidth=0.8;XS.setLineDash([2,4]);
        XS.beginPath();XS.moveTo(m.px,m.py);XS.lineTo(fl.px,fl.py);XS.stroke();XS.setLineDash([]);
        // 番号ラベル
        XS.fillStyle='rgba(255,100,0,0.8)';XS.font='8px Noto Sans JP,sans-serif';XS.textAlign='center';
        XS.fillText(ni+1,m.px,m.py-8);
      });
    }
  });
  // 移動軌道
  d.moves.forEach(m=>{
    const pts=m.pts.map(p=>sideMap(p.z,p.y,W,H));if(pts.length<2)return;
    XS.strokeStyle=m.color;XS.lineWidth=2;XS.setLineDash([8,5]);
    XS.beginPath();pts.forEach((p,i)=>i?XS.lineTo(p.px,p.py):XS.moveTo(p.px,p.py));XS.stroke();XS.setLineDash([]);
    arrowHead2D(XS,pts,m.color);
  });
  // 選手
  drawPlayers2D(XS,W,H,false);
  drawComments2D(XS,W,H,false);
}

// Catmull-Romスプライン描画（2Dキャンバス）
function drawCatmullRom(ctx,pts){
  if(pts.length<2)return;
  if(pts.length===2){ctx.beginPath();ctx.moveTo(pts[0].px,pts[0].py);ctx.lineTo(pts[1].px,pts[1].py);ctx.stroke();return;}
  ctx.beginPath();ctx.moveTo(pts[0].px,pts[0].py);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    const cp1x=p1.px+(p2.px-p0.px)/6,cp1y=p1.py+(p2.py-p0.py)/6;
    const cp2x=p2.px-(p3.px-p1.px)/6,cp2y=p2.py-(p3.py-p1.py)/6;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.px,p2.py);
  }
  ctx.stroke();
}

function drawPlayers2D(ctx,W,H,isTop){
  D().players.forEach((p,i)=>{
    const mp=isTop?topMap(p.x,p.z,W,H):sideMap(p.z,p.y,W,H);
    const isSel=selEl&&selEl.type==='player'&&selEl.idx===i;
    ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(mp.px+1.5,mp.py+1.5,11,11,0,0,Math.PI*2);ctx.fill();
    if(isSel){ctx.shadowColor=p.color;ctx.shadowBlur=12;}
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(mp.px,mp.py,12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(mp.px,mp.py,12,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    if(isSel){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(mp.px,mp.py,14,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle='#fff';ctx.font='bold 10px Noto Sans JP,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.label,mp.px,mp.py);ctx.textBaseline='alphabetic';
    if(!isTop&&p.y>0.05){
      const fl=sideMap(p.z,0,W,H);
      ctx.strokeStyle=p.color+'88';ctx.lineWidth=1;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(mp.px,mp.py+12);ctx.lineTo(fl.px,fl.py);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=p.color+'aa';ctx.beginPath();ctx.ellipse(fl.px,fl.py,5,2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='7px sans-serif';ctx.textAlign='left';ctx.fillText(p.y.toFixed(2)+'m',mp.px+14,mp.py+2);
    }
  });
}
function drawComments2D(ctx,W,H,isTop){
  D().comments.forEach((c,i)=>{
    const mp=isTop?topMap(c.x,c.z,W,H):sideMap(c.z,c.y,W,H);
    const isSel=selEl&&selEl.type==='comment'&&selEl.idx===i;
    const w=Math.max(50,c.text.length*7+12);
    ctx.fillStyle=isSel?'rgba(26,122,74,.95)':'rgba(8,8,8,.85)';
    ctx.beginPath();ctx.roundRect(mp.px-w/2,mp.py-11,w,20,4);ctx.fill();
    ctx.beginPath();ctx.moveTo(mp.px-4,mp.py+9);ctx.lineTo(mp.px,mp.py+16);ctx.lineTo(mp.px+4,mp.py+9);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.font='10px Noto Sans JP,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.text,mp.px,mp.py);ctx.textBaseline='alphabetic';
  });
}
function arrowHead2D(ctx,pts,color){
  if(pts.length<2)return;const l=pts[pts.length-1],pr=pts[pts.length-2];
  const a=Math.atan2(l.py-pr.py,l.px-pr.px);
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(l.px+Math.cos(a)*10,l.py+Math.sin(a)*10);
  ctx.lineTo(l.px+Math.cos(a-2.4)*6,l.py+Math.sin(a-2.4)*6);
  ctx.lineTo(l.px+Math.cos(a+2.4)*6,l.py+Math.sin(a+2.4)*6);
  ctx.closePath();ctx.fill();
}

function drawSideBG(ctx,W,H){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#5a6888');bg.addColorStop(0.26,'#8898b8');bg.addColorStop(0.26,'#c89848');bg.addColorStop(0.63,'#a87838');bg.addColorStop(0.63,'#7a5028');bg.addColorStop(1,'#4a3018');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const pz=52,pb=32,pt=14,scZ=(W-pz-18)/CL,scY=(H-pb-pt)/9;
  const fz=z=>pz+z*scZ,fy=y=>H-pb-y*scY;
  ctx.fillStyle='#2e6828';ctx.fillRect(fz(0),fy(0),CL*scZ,8);
  ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(fz(0),fy(0));ctx.lineTo(fz(CL),fy(0));ctx.stroke();
  [0,CL].forEach(z=>{ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(fz(z),fy(0));ctx.lineTo(fz(z),fy(0)+8);ctx.stroke();});
  // ネット
  const ng=ctx.createLinearGradient(fz(NET_Z)-4,0,fz(NET_Z)+4,0);
  ng.addColorStop(0,'#3355aa');ng.addColorStop(.5,'#6677cc');ng.addColorStop(1,'#3355aa');
  ctx.fillStyle=ng;ctx.fillRect(fz(NET_Z)-4,fy(NET_HP),8,NET_HP*scY+8);
  ctx.fillStyle='#8899dd';ctx.beginPath();ctx.ellipse(fz(NET_Z),fy(NET_HP),5,2.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2244aa';ctx.fillRect(fz(NET_Z)-10,fy(0),20,8);
  const nT=fy(NET_HP),nB=fy(0);
  ctx.fillStyle='rgba(20,20,20,.55)';ctx.fillRect(fz(NET_Z)-2,nT,4,nB-nT);
  for(let gi=0;gi<=8;gi++){const gx=fz(NET_Z)-2+(gi/8)*4;ctx.strokeStyle='rgba(80,80,80,.6)';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(gx,nT);ctx.lineTo(gx,nB);ctx.stroke();}
  for(let gi=0;gi<=14;gi++){const gy=nT+(gi/14)*(nB-nT);ctx.beginPath();ctx.moveTo(fz(NET_Z)-2,gy);ctx.lineTo(fz(NET_Z)+2,gy);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(fz(NET_Z)-3,nT,6,3);
  // 高さガイド
  [{h:.5,l:'50cm',c:'rgba(255,255,255,.14)',lw:.4,d:[3,10]},
   {h:1,l:'1m',c:'rgba(255,255,255,.18)',lw:.4,d:[3,9]},
   {h:NET_HC,l:'1.524m',c:'rgba(255,210,50,.88)',lw:1.4,d:[7,3]},
   {h:NET_HP,l:'1.55m',c:'rgba(255,230,100,.5)',lw:.8,d:[5,4]},
   {h:1.72,l:'172cm',c:'rgba(100,210,255,.28)',lw:.5,d:[2,9]},
   {h:2,l:'2m',c:'rgba(255,255,255,.14)',lw:.4,d:[3,10]},
   {h:3,l:'3m',c:'rgba(255,255,255,.11)',lw:.4,d:[3,10]},
   {h:4,l:'4m',c:'rgba(255,255,255,.09)',lw:.3,d:[3,10]},
   {h:5,l:'5m',c:'rgba(255,255,255,.07)',lw:.3,d:[3,10]},
   {h:6,l:'6m',c:'rgba(255,255,255,.06)',lw:.3,d:[3,10]},
   {h:7,l:'7m',c:'rgba(255,255,255,.05)',lw:.3,d:[3,10]},
  ].forEach(({h,l,c,lw,d})=>{
    const y=fy(h);if(y<pt||y>fy(0))return;
    ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(fz(0),y);ctx.lineTo(fz(CL),y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=c;ctx.font=(lw>1?'bold ':'')+' 7px Noto Sans JP,sans-serif';ctx.textAlign='right';ctx.fillText(l,fz(0)-2,y+3);
  });
  ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='7px Bebas Neue,sans-serif';ctx.textAlign='center';
  ctx.fillText('← 13.4m →',fz(CL/2),fy(0)+22);
  ctx.textAlign='left';ctx.fillText('自陣',fz(0),fy(0)+22);
  ctx.textAlign='right';ctx.fillText('相手',fz(CL),fy(0)+22);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// THREE.JS 3D VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let scene,camera,renderer,threeCanvas;
let orbitDown=false,orbitLast={x:0,y:0},orbitBtn=-1;
let camTheta=0.5,camPhi=0.9,camDist=20;
const camTarget=new THREE.Vector3(CW/2,0,CL/2);
const playerGroup=new THREE.Group();
const trajGroup=new THREE.Group();
const commentGroup=new THREE.Group();

function init3D(){
  const container=document.getElementById('threeContainer');
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a1a2e);
  scene.fog=new THREE.FogExp2(0x1a1a2e,0.018);
  camera=new THREE.PerspectiveCamera(48,container.clientWidth/container.clientHeight,0.1,200);
  updateCamPos();
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  threeCanvas=renderer.domElement;
  container.appendChild(threeCanvas);
  // Lights
  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const dir=new THREE.DirectionalLight(0xffffff,0.75);
  dir.position.set(8,14,8);dir.castShadow=true;
  dir.shadow.camera.near=0.1;dir.shadow.camera.far=60;
  dir.shadow.camera.left=-15;dir.shadow.camera.right=15;
  dir.shadow.camera.top=20;dir.shadow.camera.bottom=-20;
  scene.add(dir);
  [1.5,5,8.5,11.8].forEach(z=>{const pl=new THREE.PointLight(0xfffaf0,0.28,22);pl.position.set(CW/2,9,z);scene.add(pl);});
  buildCourt3D();
  scene.add(playerGroup);scene.add(trajGroup);scene.add(commentGroup);
  // Controls
  threeCanvas.addEventListener('mousedown',e=>{orbitDown=true;orbitLast={x:e.clientX,y:e.clientY};orbitBtn=e.button;e.preventDefault();});
  threeCanvas.addEventListener('mousemove',e=>{
    if(!orbitDown)return;
    const dx=e.clientX-orbitLast.x,dy=e.clientY-orbitLast.y;
    orbitLast={x:e.clientX,y:e.clientY};
    if(orbitBtn===0){camTheta-=dx*0.007;camPhi=Math.max(0.05,Math.min(Math.PI*.47,camPhi+dy*0.007));}
    else if(orbitBtn===2){const r=new THREE.Vector3();camera.getWorldDirection(r);const up=new THREE.Vector3(0,1,0);r.cross(up).normalize();camTarget.addScaledVector(r,dx*0.025);camTarget.y=Math.max(0,camTarget.y-dy*0.025);}
    updateCamPos();
  });
  threeCanvas.addEventListener('mouseup',()=>orbitDown=false);
  threeCanvas.addEventListener('mouseleave',()=>orbitDown=false);
  threeCanvas.addEventListener('wheel',e=>{camDist=Math.max(3,Math.min(45,camDist+e.deltaY*0.018));updateCamPos();e.preventDefault();},{passive:false});
  threeCanvas.addEventListener('contextmenu',e=>e.preventDefault());
  // Touch
  let lastTouch=null;
  threeCanvas.addEventListener('touchstart',e=>{if(e.touches.length===1)lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});
  threeCanvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&lastTouch){const dx=e.touches[0].clientX-lastTouch.x,dy=e.touches[0].clientY-lastTouch.y;camTheta-=dx*0.007;camPhi=Math.max(0.05,Math.min(Math.PI*.47,camPhi+dy*0.007));lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};updateCamPos();}
    e.preventDefault();
  },{passive:false});
  update3D();
  resizeAll();
  requestAnimationFrame(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);});
}

function updateCamPos(){
  camera.position.set(camTarget.x+camDist*Math.sin(camPhi)*Math.sin(camTheta),camTarget.y+camDist*Math.cos(camPhi),camTarget.z+camDist*Math.sin(camPhi)*Math.cos(camTheta));
  camera.lookAt(camTarget);
}
function setCam(mode){
  const cx=CW/2,cz=CL/2;
  if(mode==='top'){camTheta=0;camPhi=0.01;camDist=18;camTarget.set(cx,0,cz);}
  else if(mode==='side'){camTheta=Math.PI/2;camPhi=Math.PI/4;camDist=18;camTarget.set(cx,2,cz);}
  else if(mode==='front'){camTheta=0;camPhi=Math.PI/5;camDist=14;camTarget.set(cx,2,cz);}
  else{camTheta=0.5;camPhi=0.9;camDist=20;camTarget.set(cx,0,cz);}
  updateCamPos();
}
window.setCam=setCam;

function buildCourt3D(){
  // 体育館床
  const floorM=new THREE.MeshLambertMaterial({color:0xc89850});
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(32,32),floorM);
  floor.rotation.x=-Math.PI/2;floor.position.set(CW/2,-0.01,CL/2);floor.receiveShadow=true;scene.add(floor);
  // 木目ライン
  const lm=new THREE.LineBasicMaterial({color:0xb07830,transparent:true,opacity:0.3});
  for(let i=0;i<32;i++){const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-8,0,i-8),new THREE.Vector3(24,0,i-8)]);const l=new THREE.Line(geo,lm);l.position.y=0.001;scene.add(l);}
  // コート面
  const courtM=new THREE.MeshLambertMaterial({color:0x2e7a2e});
  const court=new THREE.Mesh(new THREE.PlaneGeometry(CW,CL),courtM);
  court.rotation.x=-Math.PI/2;court.position.set(CW/2,0,CL/2);court.receiveShadow=true;scene.add(court);
  // コートライン
  const wl=new THREE.LineBasicMaterial({color:0xffffff,linewidth:2});
  function cl(pts){const geo=new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(p[0],.005,p[1])));scene.add(new THREE.Line(geo,wl));}
  cl([[0,0],[CW,0],[CW,CL],[0,CL],[0,0]]);
  cl([[CW/2,0],[CW/2,CL]]);
  cl([[0,NET_Z],[CW,NET_Z]]);
  cl([[0,NET_Z-1.98],[CW,NET_Z-1.98]]);
  cl([[0,NET_Z+1.98],[CW,NET_Z+1.98]]);
  cl([[.46,0],[.46,CL]]);cl([[CW-.46,0],[CW-.46,CL]]);
  const dl=new THREE.LineDashedMaterial({color:0xffffff,linewidth:1,dashSize:.25,gapSize:.18,transparent:true,opacity:.55});
  function dcl(pts){const geo=new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(p[0],.006,p[1])));const l=new THREE.Line(geo,dl);l.computeLineDistances();scene.add(l);}
  dcl([[0,.76],[CW,.76]]);dcl([[0,CL-.76],[CW,CL-.76]]);
  // ネット
  const postM=new THREE.MeshPhongMaterial({color:0x3366cc,shininess:50});
  [-0.45,CW+0.45].forEach(px=>{
    const post=new THREE.Mesh(new THREE.CylinderGeometry(.055,.055,NET_HP,8),postM);post.position.set(px,NET_HP/2,NET_Z);post.castShadow=true;scene.add(post);
    const base=new THREE.Mesh(new THREE.BoxGeometry(.4,.08,.4),postM);base.position.set(px,.04,NET_Z);scene.add(base);
  });
  const nl=new THREE.LineBasicMaterial({color:0x555555,transparent:true,opacity:.65});
  for(let c=0;c<=20;c++){const gx=-0.45+c*(CW+.9)/20;const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(gx,.005,NET_Z),new THREE.Vector3(gx,NET_HP,NET_Z)]);scene.add(new THREE.Line(geo,nl));}
  for(let r=0;r<=10;r++){const gy=r*NET_HP/10;const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-0.45,gy,NET_Z),new THREE.Vector3(CW+.45,gy,NET_Z)]);scene.add(new THREE.Line(geo,nl));}
  const tape=new THREE.Mesh(new THREE.BoxGeometry(CW+.9,.04,.015),new THREE.MeshLambertMaterial({color:0xffffff}));tape.position.set(CW/2,NET_HP-.02,NET_Z);scene.add(tape);
  // 壁
  const wallM=new THREE.MeshLambertMaterial({color:0xd0b870,side:THREE.BackSide});
  const walls=new THREE.Mesh(new THREE.BoxGeometry(36,13,36),wallM);walls.position.set(CW/2,6.5,CL/2);scene.add(walls);
  // 照明
  const bulbM=new THREE.MeshBasicMaterial({color:0xfffcf0});
  [1.5,5,8.5,11.8].forEach(z=>{const b=new THREE.Mesh(new THREE.SphereGeometry(.15,8,8),bulbM);b.position.set(CW/2,9,z);scene.add(b);});
}

function update3D(){
  const d=D();
  // 選手
  while(playerGroup.children.length)playerGroup.remove(playerGroup.children[0]);
  d.players.forEach(p=>{
    const cvs=document.createElement('canvas');cvs.width=96;cvs.height=96;
    const c=cvs.getContext('2d');c.clearRect(0,0,96,96);
    c.fillStyle='rgba(255,255,255,0.92)';c.beginPath();c.arc(48,48,44,0,Math.PI*2);c.fill();
    c.fillStyle=p.color;c.beginPath();c.arc(48,48,40,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';c.font='bold 38px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(p.label,48,50);
    const tex=new THREE.CanvasTexture(cvs);
    const sm=new THREE.SpriteMaterial({map:tex,depthTest:false,alphaTest:.05,transparent:true});
    const sp=new THREE.Sprite(sm);sp.position.set(p.x,p.y+0.45,p.z);sp.scale.set(.85,.85,.85);playerGroup.add(sp);
    if(p.y>0.05){
      const pts=[new THREE.Vector3(p.x,p.y,p.z),new THREE.Vector3(p.x,0,p.z)];
      const lg=new THREE.BufferGeometry().setFromPoints(pts);
      const lm=new THREE.LineDashedMaterial({color:p.color,transparent:true,opacity:.4,dashSize:.12,gapSize:.08});
      const ln=new THREE.Line(lg,lm);ln.computeLineDistances();playerGroup.add(ln);
    }
  });
  // 軌道
  while(trajGroup.children.length)trajGroup.remove(trajGroup.children[0]);
  // シャトル軌道（Catmull-Romで滑らか）
  d.shuttles.forEach(s=>{
    if(!s.nodes)return;
    const allPts=[{x:s.x0,y:0,z:s.z0},...s.nodes,{x:s.x1,y:0,z:s.z1}];
    const v3pts=allPts.map(p=>new THREE.Vector3(p.x,p.y,p.z));
    const curve=new THREE.CatmullRomCurve3(v3pts);
    const pts3d=curve.getPoints(60);
    const geo=new THREE.BufferGeometry().setFromPoints(pts3d);
    const mat=new THREE.LineBasicMaterial({color:s.color,linewidth:3});
    trajGroup.add(new THREE.Line(geo,mat));
    // 矢印
    if(v3pts.length>=2){
      const last=pts3d[pts3d.length-1],prev=pts3d[pts3d.length-3];
      const dir=new THREE.Vector3().subVectors(last,prev).normalize();
      const arrow=new THREE.ArrowHelper(dir,last,.5,new THREE.Color(s.color).getHex(),.35,.2);
      trajGroup.add(arrow);
    }
  });
  // 移動軌道
  d.moves.forEach(m=>{
    if(m.pts.length<2)return;
    const v3pts=m.pts.map(p=>new THREE.Vector3(p.x,p.y,p.z));
    const curve=new THREE.CatmullRomCurve3(v3pts);
    const pts3d=curve.getPoints(40);
    const geo=new THREE.BufferGeometry().setFromPoints(pts3d);
    const mat=new THREE.LineDashedMaterial({color:m.color,dashSize:.3,gapSize:.15,linewidth:2});
    const ln=new THREE.Line(geo,mat);ln.computeLineDistances();trajGroup.add(ln);
    if(v3pts.length>=2){const last=pts3d[pts3d.length-1],prev=pts3d[pts3d.length-3];const dir=new THREE.Vector3().subVectors(last,prev).normalize();trajGroup.add(new THREE.ArrowHelper(dir,last,.5,new THREE.Color(m.color).getHex(),.35,.2));}
  });
  // コメント
  while(commentGroup.children.length)commentGroup.remove(commentGroup.children[0]);
  d.comments.forEach(c=>{
    const tw=Math.max(100,c.text.length*9+18);
    const cvs=document.createElement('canvas');cvs.width=tw;cvs.height=38;
    const ctx2=cvs.getContext('2d');ctx2.fillStyle='rgba(0,0,0,.82)';ctx2.beginPath();ctx2.roundRect(0,0,tw,38,5);ctx2.fill();
    ctx2.fillStyle='#fff';ctx2.font='13px sans-serif';ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText(c.text,tw/2,19);
    const tex=new THREE.CanvasTexture(cvs);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false,transparent:true}));
    sp.position.set(c.x,c.y+.5,c.z);sp.scale.set(tw/55,38/55,1);commentGroup.add(sp);
  });
}

    const W=p3.clientWidth,H=p3.clientHeight;

  }

}
